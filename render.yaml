services:
  - type: web
    name: pharm-study-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /tmp/pharm_study.db
      - key: FLASK_DEBUG
        value: "0"
